        const memberId = [[${memberId}]];
        const profileImageUrl = [[${profileImageUrl}]] /*'/images/profile/default_image.png'*/;
    </script>
    <script src="/js/common/mobile-nav.js" defer></script>
    <script src="/js/main/service.js"></script>

<body>
<div class="bookmark-shell">
<th:block layout:fragment="content">
    <main class="bookmark-main">
        <header class="bookmark-header">
            <button
                    class="header-back"
                    id="headerBack"
                    type="button"
                    aria-label="뒤로 가기"
            >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path

            <h1
                    class="header-title"
                    id="headerTitle"
                    data-default-title="모든 북마크"
            >
                모든 북마크
            </h1>
            <button
                    class="header-action"
                    id="modalOpenButton"
                    type="button"
                    aria-label="북마크 추가"
            >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                            d="M18 3V0h2v3h3v2h-3v3h-2V5h-3V3zm-7.5 1a.5.5 0 00-.5.5V7h3.5A2.5 2.5 0 0116 9.5v3.48l3 2.1V11h2v7.92l-5-3.5v7.26l-6.5-3.54L3 22.68V9.5A2.5 2.5 0 015.5 7H8V4.5A2.5 2.5 0 0110.5 2H12v2zm-5 5a.5.5 0 00-.5.5v9.82l4.5-2.46 4.5 2.46V9.5a.5.5 0 00-.5-.5z"
                    />
                </svg>
            </button>
            <button
                    class="header-action"
                    id="detailMoreButton"
                    type="button"
                    aria-label="더 보기"
                    aria-haspopup="menu"
                    aria-expanded="false"
                    hidden
            >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                            d="M3 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm9 2c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"
                    />
                </svg>
            </button>
        </header>

        <section class="bookmark-view" id="bookmarkListView">
            <section
                    class="bookmark-search-section"
                    aria-label="북마크 검색"
            >
                <div class="search-box" id="searchBox">
                    <svg
                            viewBox="0 0 24 24"
                            class="search-icon"
                            aria-hidden="true"
                    >
                        <path
                                d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"

                            class="search-input"
                            type="search"
                            placeholder="북마크 검색"
                            aria-label="북마크 검색"
                    />
                </div>
            </section>

            <section class="bookmark-list" id="bookmarkFolderList" aria-label="북마크 폴더 목록">
                <!-- 폴더 목록은 JS에서 동적 생성 -->
            </section>


        </section>

        <section
                class="bookmark-view bookmark-detail-view"
                id="bookmarkDetailView"
                hidden
        >
            <section
                    class="empty-state"
                    id="bookmarkPostsEmpty"
                    aria-live="polite"
                    hidden
            >
                <div class="empty-copy">
                    <h2 class="empty-title">저장된 게시물이 없습니다</h2>
                    <p class="empty-description">
                        북마크를 해제하면 이 목록에서 바로 사라집니다.
                    </p>
                </div>
            </section>
            <div class="bookmark-detail-feed" id="bookmarkPosts">
                <!-- 게시물 카드는 JS에서 동적 생성 -->
            </div>
        </section>
    </main>
</th:block>
