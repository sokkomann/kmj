             loginMember 가 없는 페이지(main/explore 등)에선 기존처럼 member 가 곧 로그인 사용자라 폴백 OK. -->

                 좌표를 % 로 두어 사이드바 폭이 달라져도 같은 위치에 정렬되게 한다. -->
            <div class="account-menu-popup off" id="accountMenuPopup">
                <button class="account-menu-logout" id="accountLogoutButton">계정에서 로그아웃</button>
            </div>

                    <span class="profile-handle" id="accountHandle" th:text="${navMember?.memberHandle ?: ''}"></span>
                </div>

            </div>
