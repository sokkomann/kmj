<!doctype html>
<html lang="ko" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/common/layout}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>커뮤니티</title>
        <link rel="stylesheet" href="/css/main/main.css" />
        <link rel="stylesheet" href="/css/common/mobile-nav.css" />
        <link rel="stylesheet" href="/css/community/community.css" />
        <script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@3.0.3/dist/index.min.js" crossorigin="anonymous"></script>
        <script defer src="/js/common/mobile-nav.js"></script>
        <script defer src="/js/community/service.js"></script>
        <script defer src="/js/community/layout.js"></script>
        <script defer src="/js/community/event.js"></script>
        <script defer src="/js/utils/exchange.js"></script>
    </head>
    <body>
        <main class="communityPage">
            <th:block layout:fragment="content">
            <section class="timelinePanel communityTimeline"  th:data-member-id="${memberId}" th:data-profile-image="${profileImageUrl}">
                <header class="communityTopbar">
                    <button type="button" class="communityIconButton" aria-label="뒤로 가기">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path>
                        </svg>
                    </button>
                    <div class="communityTopbar__title">
                        <strong>커뮤니티</strong>
                    </div>
                    <!-- 검색 (메인 스타일 인라인 드롭다운) -->
                    <form class="communitySearchForm" id="communitySearchForm">
                        <label class="communitySearchField">
                            <span class="communitySearchIcon">
                                <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><g><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"></path></g></svg>
                            </span>
                            <input class="communitySearchInput" id="communitySearchInput" placeholder="커뮤니티 검색" type="search" autocomplete="off">
                        </label>
                        <div class="communitySearchPanel off" id="communitySearchPanel">
                            <div class="communitySearchPanelEmpty" id="communitySearchPanelEmpty">
                                <p class="communitySearchPanelText">커뮤니티 이름으로 검색해 보세요.</p>
                            </div>
                            <div class="communitySearchResultList" id="communitySearchResults"></div>
                        </div>
                    </form>
                    <div class="communityTopbar__actions">
                        <button type="button" class="communityIconButton" aria-label="새 커뮤니티 만들기" data-create-community-btn>
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2z"></path>
                            </svg>
                        </button>
                    </div>
                </header>

                <section class="communityHub">
                    <input class="communityTabInput" type="radio" name="communityTab" id="communityTabHome" checked />
                    <input class="communityTabInput" type="radio" name="communityTab" id="communityTabExplore" />

                    <div class="communityTabs">
                        <label class="communityTabLabel communityTabLabel--home" for="communityTabHome">
                            <span>홈</span>
                        </label>
                        <label class="communityTabLabel communityTabLabel--explore" for="communityTabExplore">
                            탐색하기
                        </label>
                    </div>

                    <div class="communityPanels">
                        <section class="communityPanel communityPanel--home">
                            <div class="communityRail-wrap">
                                <button class="communityRail-arrow communityRail-arrow--left" id="railScrollLeft" type="button" style="display:none" aria-label="왼쪽으로 스크롤">
                                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/></svg>
                                </button>
                                <div class="communityRail" aria-label="내 커뮤니티">
                                    <!-- JS가 동적 렌더링 -->
                                </div>
                                <button class="communityRail-arrow communityRail-arrow--right" id="railScrollRight" type="button" style="display:none" aria-label="오른쪽으로 스크롤">
                                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z" fill="currentColor"/></svg>
                                </button>
                            </div>

                            <section class="communityFeedSection communityFeedSection--home" aria-label="홈 게시물 목록">
                                <!-- JS가 동적 렌더링 -->
                            </section>
                        </section>

                        <section class="communityPanel communityPanel--explore">
                            <div class="category-banner">
                                <div class="category-scroll-wrap">
                                    <button class="category-scroll-arrow category-scroll-left" id="scrollLeft" type="button" style="display: none" aria-label="왼쪽으로 스크롤">
                                        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                                            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"></path>
                                        </svg>
                                    </button>
                                    <div class="category-scroll" id="categoryScroll">
                                        <button class="cat-chip active" type="button" data-cat="전체" data-category-id="">전체</button>
                                        <button class="cat-chip" type="button" data-cat="수출" data-category-id="1">수출</button>
                                        <button class="cat-chip" type="button" data-cat="수입" data-category-id="2">수입</button>
                                        <button class="cat-chip" type="button" data-cat="물류" data-category-id="3">물류</button>
                                        <button class="cat-chip" type="button" data-cat="관세" data-category-id="4">관세</button>
                                        <button class="cat-chip" type="button" data-cat="금융" data-category-id="5">금융</button>
                                        <button class="cat-chip" type="button" data-cat="IT" data-category-id="6">IT</button>
                                        <button class="cat-chip" type="button" data-cat="식품" data-category-id="7">식품</button>
                                        <button class="cat-chip" type="button" data-cat="화장품" data-category-id="8">화장품</button>
                                        <button class="cat-chip" type="button" data-cat="자동차" data-category-id="9">자동차</button>
                                        <button class="cat-chip" type="button" data-cat="섬유/의류" data-category-id="10">섬유/의류</button>
                                        <button class="cat-chip" type="button" data-cat="기계/장비" data-category-id="11">기계/장비</button>
                                        <button class="cat-chip" type="button" data-cat="에너지" data-category-id="12">에너지</button>
                                    </div>
                                    <button class="category-scroll-arrow category-scroll-right" id="scrollRight" type="button" style="display: none" aria-label="오른쪽으로 스크롤">
                                        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                                            <path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z" fill="currentColor"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <div class="communityRail-wrap">
                                <button class="communityRail-arrow communityRail-arrow--left" id="exploreRailLeft" type="button" style="display:none" aria-label="왼쪽으로 스크롤">
                                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/></svg>
                                </button>
                                <div class="communityRail communityRail--explore" aria-label="탐색 커뮤니티">
                                    <!-- JS가 동적 렌더링 -->
                                </div>
                                <button class="communityRail-arrow communityRail-arrow--right" id="exploreRailRight" type="button" style="display:none" aria-label="오른쪽으로 스크롤">
                                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z" fill="currentColor"/></svg>
                                </button>
                            </div>

                            <section class="communityFeedSection communityFeedSection--explore" aria-label="탐색 목록">
                                <!-- JS가 동적 렌더링 -->
                            </section>
                        </section>
                    </div>
                </section>
            </section>

            <!-- 모바일 nav + 더보기 아코디언 (공용 fragment) -->
            <div th:replace="~{common/mobile-nav :: mobileNav('more')}"></div>
            <div th:replace="~{common/mobile-nav :: mobileMoreSheet}"></div>
            </th:block>
        </main>
        <th:block layout:fragment="modals">
        <!-- 동적 드롭다운 마운트 지점: event.js의 공유/더보기 드롭다운이 여기에 append/remove 된다 -->
        <div id="layers" aria-hidden="true"></div>

        <!-- 새 커뮤니티 만들기 모달 -->
        <div class="create-community-overlay" data-create-community-modal hidden>
            <div class="create-community-backdrop" data-community-close></div>
            <div class="create-community-card" role="dialog" aria-modal="true" aria-labelledby="create-community-title">
                <div class="create-community-header">
                    <button type="button" class="create-community-close" aria-label="닫기" data-community-close>
                        <svg viewBox="0 0 24 24" aria-hidden="true"><g><path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path></g></svg>
                    </button>
                    <h2 id="create-community-title" class="create-community-title">새 커뮤니티 만들기</h2>
                    <button type="button" class="create-community-submit" data-community-submit disabled>만들기</button>
                </div>
                <div class="create-community-body">
                    <p class="create-community-desc">커뮤니티에 대해 좀 더 알려주세요. 이러한 세부 사항은 나중에 언제든지 수정 가능합니다.</p>
                    <div class="create-community-field">
                        <div class="create-community-name-wrapper">
                            <div class="create-community-name-header">
                                <label class="create-community-name-label" for="communityNameInput">커뮤니티 이름</label>
                                <span class="create-community-name-counter"><span data-community-name-count>0</span> / 30</span>
                            </div>
                            <input type="text" id="communityNameInput" class="create-community-name-textarea" data-community-name maxlength="30">
                        </div>
                        <p class="create-community-hint">이름은 3~30자 사이여야 하며 해시태그나 @사용자 아이디를 포함할 수 없습니다</p>
                    </div>
                    <div class="create-community-field">
                        <label class="communityModal__coverUpload" data-cover-upload>
                            <span class="communityModal__coverUploadText">커버 이미지 업로드</span>
                            <input type="file" accept="image/*" data-cover-file hidden>
                            <img class="communityModal__coverPreview" data-cover-preview hidden alt="커버 미리보기">
                        </label>
                    </div>
                    <div class="create-community-field">
                        <select class="communityModal__categorySelect" data-community-category>
                            <option value="">카테고리 선택</option>
                            <option value="1">수출</option>
                            <option value="2">수입</option>
                            <option value="3">물류</option>
                            <option value="4">관세</option>
                            <option value="5">금융</option>
                            <option value="6">IT</option>
                            <option value="7">식품</option>
                            <option value="8">화장품</option>
                            <option value="9">자동차</option>
                            <option value="10">섬유/의류</option>
                            <option value="11">기계/장비</option>
                            <option value="12">에너지</option>
                        </select>
                    </div>
                    <div class="create-community-field">
                        <textarea class="communityModal__description" data-community-description placeholder="커뮤니티 설명" rows="4"></textarea>
                        <p class="create-community-hint">커뮤니티를 설명할 수 있는 명확한 목적을 제시하면 사람들이 이 커뮤니티가 어떤 곳인지 더 잘 이해할 수 있습니다</p>
                    </div>
                    <!-- 멤버십: 현재 모든 커뮤니티는 전체 공개 (비공개/승인제 미구현) -->
                </div>
            </div>
        </div>

        <!-- FAB 삭제됨: 커뮤니티 목록 페이지에서 게시글 작성은 상세 페이지에서만 가능 -->

        </th:block>

    </body>
</html>
