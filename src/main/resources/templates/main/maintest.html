<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/images/logo/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address</title>
</head>
<body>
<form onsubmit="searchPlaces(); return false;">
    키워드 : <input type="text" id="keyword" size="15">
    <button type="submit">검색하기</button>
</form>
<ul id="address-list"></ul>
</body>
<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=23b680736d38dd0d2e4cd3b04094a573&libraries=services"></script>
<script>
    // 장소 검색 객체를 생성합니다
    var ps = new kakao.maps.services.Places();

    // 키워드 검색을 요청하는 함수입니다
    function searchPlaces() {
        var keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return false;
        }

        // 장소검색 객체를 통해 키워드로 장소검색을 요청합니다
        ps.keywordSearch(keyword, placesSearchCB);
    }

    // 장소검색이 완료됐을 때 호출되는 콜백함수 입니다
    function placesSearchCB(datas, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            const addressNameSet = new Set();
            const addressList = document.getElementById("address-list");
            let text = ``;

            datas.forEach((data) => {
                let addressName = data.address_name;
                const addressNames = addressName.split(" ");
                const lastPart = addressNames[addressNames.length - 1];

                // 정규표현식: 숫자, '-'로만 이루어진 마지막 단어(지번)인지 확인
                // 예: "123", "12-5" 등을 매칭
                const addressRegex = /^[0-9-]+$/;

                if (addressRegex.test(lastPart)) {
                    // 지번이 맞다면 마지막 단어를 제외하고 다시 합침
                    addressName = addressNames.slice(0, -1).join(" ");
                }

                // Set에 추가하여 자동으로 중복 제거
                addressNameSet.add(addressName);
            });

            addressNameSet.forEach((addressName) => {
                text += `
                <li>${addressName}</li>
            `;
            })


            addressList.innerHTML = text;


        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {

            alert('검색 결과가 존재하지 않습니다.');
            return;

        } else if (status === kakao.maps.services.Status.ERROR) {

            alert('검색 결과 중 오류가 발생했습니다.');
            return;

        }
    }
</script>
</html>
