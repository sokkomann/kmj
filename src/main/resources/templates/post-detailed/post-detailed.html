<!doctype html>
<html lang="ko" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/common/layout}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>게시물 / X</title>
    <link rel="stylesheet" href="/css/common/mobile-nav.css" th:href="@{/css/common/mobile-nav.css}"/>
    <link rel="stylesheet" href="/css/post-detailed/post-detailed.css"/>
    <link rel="stylesheet" href="/css/mention/mention.css"/>
    <link rel="stylesheet" href="/css/main/product-in-mainpage.css"/>
    <script src="/js/common/mobile-nav.js" th:src="@{/js/common/mobile-nav.js}" defer></script>
    <script src="/js/common/profile-link.js" defer></script>
    <script th:inline="javascript">
        const memberId = [[${memberId}]];
        const postId = [[${post.id}]];
        const postMemberId = [[${post.memberId}]];
        const postMemberHandle = [[${post.memberHandle}]];
        const postIsFollowed = [[${post.followed}]];
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@3.0.3/dist/index.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5edccf3b451ef7d32d5c833781ba22dc&libraries=services"></script>
<!--    <script src="/js/post-detailed/post-detailed-copy/layout.js"></script>-->
<!--    <script src="/js/post-detailed/post-detailed-copy/service.js"></script>-->
<!--    <script src="/js/post-detailed/post-detailed-copy/event.js"></script>-->
    <script src="/js/bookmark/service.js"></script>
    <script src="/js/post-detailed/layout.js"></script>
    <script src="/js/post-detailed/service.js"></script>
    <script src="/js/post-detailed/event.js"></script>
    <script src="/js/utils/exchange.js"></script>
</head>
<body>
<th:block layout:fragment="content">
<div class="post-detail-shell" id="postDetail">
    <main class="post-detail-main">
        <header class="post-detail-header">
            <button class="post-detail-back" id="postDetailBack" type="button" aria-label="뒤로 가기">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path>
                </svg>
            </button>
            <h1 class="post-detail-header-title">게시물</h1>
        </header>

        <section class="post-detail-thread" aria-label="게시물 상세">
            <div class="postCard"
                 data-post-card
                 th:data-post-id="${post.id}"
                 th:data-member-id="${post.memberId}"
                 th:attr="data-community-id=${post.communityId}"
                 th:classappend="${post.communityId != null ? ' communityPostCard' : ''}">
                <div class="postBody">
                    <div th:if="${post.communityId != null}" class="post-detail-community-meta">
                        <a class="post-detail-community-link" th:href="'/community/' + ${post.communityId}" th:text="${post.communityName}"></a>
                        <span th:if="${post.categoryName != null}" class="post-detail-community-category" th:text="${post.categoryName}"></span>
                    </div>
                    <header class="postHeader">
                        <div class="postIdentity">
                            <div class="postAvatar postAvatar--image" th:data-profile-id="${post.memberId}">
                                <img class="postAvatarImage" th:src="${post.memberProfileFileName != null ? post.memberProfileFileName : '/images/profile/default_image.png'}" alt="프로필" onerror="this.src='/images/profile/default_image.png'"/>
                            </div>
                            <div class="postIdentity__copy">
                                <div class="postIdentity__nameRow">
                                    <strong class="postName" th:text="${post.memberNickname ?: post.memberHandle}"></strong>
                                </div>
                                <div class="postIdentity__metaRow">
                                    <span class="postHandle" th:text="${post.memberHandle}"></span>
                                    <span class="postIdentity__sep">·</span>
                                    <span class="postTime" th:text="${post.createdDatetime}"></span>
                                </div>
                            </div>
                        </div>
                        <button class="postMoreButton" id="heroMoreButton" type="button" aria-label="게시물 더 보기" aria-haspopup="menu" aria-expanded="false">
                            <svg class="postMoreIcon" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M3 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm9 2c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path>
                            </svg>
                        </button>
                    </header>

                    <p class="postText" th:text="${post.postContent}"></p>

                    <div th:if="${post.location != null}" class="postLocation">
                        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" class="postLocation__icon"><g><path d="M12 2c-4.687 0-8.5 3.813-8.5 8.5 0 5.967 7.621 11.116 7.945 11.332l.555.37.555-.37c.324-.216 7.945-5.365 7.945-11.332C20.5 5.813 16.687 2 12 2zm0 11.5c-1.65 0-3-1.34-3-3s1.35-3 3-3c1.66 0 3 1.34 3 3s-1.34 3-3 3z"></path></g></svg>
                        <span class="postLocation__text" th:text="${post.location}"></span>
                    </div>

                    <div th:if="${post.hashtags != null and !post.hashtags.isEmpty()}" class="postHashtags">
                        <a th:each="tag : ${post.hashtags}" class="postHashtag"
                           th:href="'/explore/search?keyword=' + ${tag.tagName}"
                           th:text="'#' + ${tag.tagName}"></a>
                    </div>

                    <th:block th:if="${post.productId != null}">
                        <div class="Post-Product-Info">
                            <div class="Post-Product-Image">
                                <img th:src="${post.productImage != null ? post.productImage : '/images/main/global-gates-logo.png'}">
                            </div>
                            <div class="Post-Product-Detail">
                                <strong class="Post-Title" th:text="${post.productTitle}"></strong>
                                <span name="stock" class="Detail-Value" th:text="'수량 ' + ${post.productStock}"></span>
                                <span name="price" class="Detail-Value" th:text="'개당 ' + ${#numbers.formatInteger(post.productPrice, 0, 'COMMA')} + '원'"></span>
                            </div>
                        </div>
                    </th:block>

                <div th:if="${post.postFiles != null and !post.postFiles.isEmpty()}"
                     th:classappend="${#lists.size(post.postFiles) == 1} ? ' post-detail-media-grid--single' : (${#lists.size(post.postFiles) == 3} ? ' post-detail-media-grid--triple' : '')"
                     class="post-detail-media-grid">
                    <th:block th:each="pf : ${post.postFiles}">
                        <video th:if="${pf.contentType.name() == 'VIDEO'}" controls class="post-detail-media-image">
                            <source th:src="${pf.filePath}"/>
                        </video>
                        <img th:unless="${pf.contentType.name() == 'VIDEO'}" th:src="${pf.filePath}" alt="첨부 이미지" class="post-detail-media-image"/>
                    </th:block>
                </div>

                <div class="post-detail-meta">
                    <span>조회수</span>
                    <span th:text="${post.postReadCount}"></span>
                </div>

                <div class="post-detail-actions tweet-action-bar">
                    <div class="post-detail-action-slot">
                        <button class="post-detail-action-button tweet-action-btn" type="button" data-testid="reply"
                                th:attr="aria-label='답글 ' + ${post.replyCount}">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z"></path>
                            </svg>
                            <span class="tweet-action-count" th:text="${post.replyCount}">0</span></button>
                    </div>
                    <div class="post-detail-action-slot">
                        <button class="post-detail-action-button post-detail-action-button--like tweet-action-btn tweet-action-btn--like"
                                th:classappend="${post.liked} ? ' active' : ''"
                                type="button" data-testid="like">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path data-path-inactive="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"
                                      data-path-active="M20.884 13.19c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"
                                      th:attr="d=${post.liked} ? 'M20.884 13.19c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z' : 'M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z'"></path>
                            </svg>
                            <span class="tweet-action-count" th:text="${post.likeCount}">0</span></button>
                    </div>
                    <div class="post-detail-action-slot">
                        <button class="post-detail-action-button post-detail-action-button--bookmark tweet-action-btn tweet-action-btn--bookmark"
                                th:classappend="${post.bookmarked} ? ' active' : ''"
                                type="button" data-testid="bookmark" aria-label="북마크">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path data-path-inactive="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.22-.5.5v14.56l6-4.29 6 4.29V4.5c0-.28-.224-.5-.5-.5h-11z"
                                      data-path-active="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5z"
                                      th:attr="d=${post.bookmarked} ? 'M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5z' : 'M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.22-.5.5v14.56l6-4.29 6 4.29V4.5c0-.28-.224-.5-.5-.5h-11z'"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="post-detail-action-slot">
                        <button class="post-detail-action-button tweet-action-btn tweet-action-btn--share"
                                id="heroShareButton" type="button" aria-label="게시물 공유하기" aria-haspopup="menu"
                                aria-expanded="false">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 2.59l5.7 5.7-1.41 1.42L13 6.41V16h-2V6.41l-3.3 3.3-1.41-1.42L12 2.59zM21 15l-.02 3.51c0 1.38-1.12 2.49-2.5 2.49H5.5C4.11 21 3 19.88 3 18.5V15h2v3.5c0 .28.22.5.5.5h12.98c.28 0 .5-.22.5-.5L19 15h2z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                </div>
            </div>

            <section class="post-detail-reply-box">
                <!-- 메인 게시글 하단 인라인 답글 작성기: 댓글/답글 카드 모달과 별도로 유지한다. -->
                <div class="post-detail-inline-reply">
                    <div class="post-detail-inline-reply-context" hidden>
                        <button class="post-detail-inline-reply-context-button" type="button">
                            <span class="post-detail-inline-reply-context-handle" th:text="${post.memberHandle}"></span>님에게 보내는 답글
                        </button>
                    </div>

                    <div class="post-detail-inline-reply-card tweet-modal__composer">
                        <div class="post-detail-inline-reply-avatar">
                            <img th:src="${loginMember.fileName != null ? loginMember.fileName : '/images/profile/default_image.png'}" alt="내 프로필"
                                 class="tweet-modal__avatar-image"/>
                        </div>
                        <div class="post-detail-inline-reply-body tweet-modal__input-wrap">
                            <div class="composerField">
                                <div
                                        class="post-detail-inline-reply-editor tweet-modal__editor"
                                        contenteditable="true"
                                        role="textbox"
                                        aria-label="답글 입력"
                                        aria-multiline="true"
                                        spellcheck="true"
                                        data-testid="tweetTextarea_0"
                                        data-placeholder="답글 게시하기"
                                ></div>
                            </div>

                            <div
                                    class="tweet-modal__attachment post-detail-inline-reply-attachments attachments"
                                    data-attachment-preview
                                    hidden
                            >
                                <div
                                        class="post-detail-inline-reply-attachment-media tweet-modal__attachment-media media-grid-wrapper"
                                        data-attachment-media
                                ></div>
                                <div class="tweet-modal__attachment-meta media-actions-bar">
                                    <button type="button" class="tweet-modal__attachment-meta-btn media-action-link"
                                            data-user-tag-trigger hidden>
                                        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                                            <g>
                                                <path d="M5.651 19h12.698c-.337-1.8-1.023-3.21-1.945-4.19C15.318 13.65 13.838 13 12 13s-3.317.65-4.404 1.81c-.922.98-1.608 2.39-1.945 4.19zm.486-5.56C7.627 11.85 9.648 11 12 11s4.373.85 5.863 2.44c1.477 1.58 2.366 3.8 2.632 6.46l.11 1.1H3.395l.11-1.1c.266-2.66 1.155-4.88 2.632-6.46zM12 4c-1.105 0-2 .9-2 2s.895 2 2 2 2-.9 2-2-.895-2-2-2zM8 6c0-2.21 1.791-4 4-4s4 1.79 4 4-1.791 4-4 4-4-1.79-4-4z"></path>
                                            </g>
                                        </svg>
                                        <span data-user-tag-label>사용자 태그하기</span>
                                    </button>
                                    <button type="button" class="tweet-modal__attachment-meta-btn media-action-link"
                                            data-media-alt-trigger hidden>
                                        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                                            <g>
                                                <path d="M3 4.5C3 3.12 4.12 2 5.5 2h13C19.88 2 21 3.12 21 4.5v15c0 1.38-1.12 2.5-2.5 2.5h-13C4.12 22 3 20.88 3 19.5v-15zM5.5 4c-.28 0-.5.22-.5.5v15c0 .28.22.5.5.5h13c.28 0 .5-.22.5-.5v-15c0-.28-.22-.5-.5-.5h-13zM16 10H8V8h8v2zm-8 2h8v2H8v-2z"></path>
                                            </g>
                                        </svg>
                                        <span data-media-alt-label>설명 추가</span>
                                    </button>
                                </div>
                            </div>

                            <!-- 선택된 상품 표시 -->
                            <div class="tweet-modal__selected-product" data-inline-selected-product hidden>
                                <div class="selected-product__card">
                                    <img class="selected-product__image" src="" alt="" data-inline-selected-product-image/>
                                    <div class="selected-product__info">
                                        <strong class="selected-product__name" data-inline-selected-product-name></strong>
                                        <span class="selected-product__price" data-inline-selected-product-price></span>
                                    </div>
                                    <button type="button" class="selected-product__remove" aria-label="판매글 제거" data-inline-product-remove>
                                        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><g><path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path></g></svg>
                                    </button>
                                </div>
                            </div>

                            <div class="composerMeta" hidden>
                                <div class="composerMetaRow">
                                    <div class="replyAudience">
                                        <button type="button" class="composerTagLabel" data-inline-tag-toggle>태그 추가</button>
                                        <div class="composerTagEditor off" data-inline-tag-editor>
                                            <input type="text" class="composerTagField" data-inline-tag-field placeholder="태그 입력" />
                                        </div>
                                        <div class="tag-input off" data-inline-tag-input></div>
                                        <button type="button" class="tweet-modal__location-display" hidden>
                                            <div class="tweet-modal__location-display-inner">
                                                <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" class="tweet-modal__location-display-icon"><g><path d="M12 2c-4.687 0-8.5 3.813-8.5 8.5 0 5.967 7.621 11.116 7.945 11.332l.555.37.555-.37c.324-.216 7.945-5.365 7.945-11.332C20.5 5.813 16.687 2 12 2zm0 11.5c-1.65 0-3-1.34-3-3s1.35-3 3-3c1.66 0 3 1.34 3 3s-1.34 3-3 3z"></path></g></svg>
                                                <div class="tweet-modal__location-display-text-wrap">
                                            <span class="tweet-modal__location-display-text-outer">
                                                <input type="text" class="tweet-modal__location-display-text-inner" name="location" readonly />
                                            </span>
                                                </div>
                                            </div>
                                        </button>
                                    </div>
                                </div>
                                <!-- 카테고리 chip 목록 (compose-modal 패턴 동일) -->
                                <div class="category-banner composerCategoryBanner">
                                    <div class="category-scroll-wrap">
                                        <button type="button" class="category-scroll-arrow category-scroll-left off">
                                            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor" /></svg>
                                        </button>
                                        <div class="category-scroll">
                                            <button type="button" class="cat-chip active">전체</button>
                                            <button type="button" class="cat-chip has-subs" data-subs="미주,유럽,동남아,중국,일본,중동">수출 ›</button>
                                            <button type="button" class="cat-chip has-subs" data-subs="원자재,완제품,식품,전자부품">수입 ›</button>
                                            <button type="button" class="cat-chip has-subs" data-subs="해운,항공,육상,창고">물류 ›</button>
                                            <button type="button" class="cat-chip has-subs" data-subs="FTA,HS코드,통관,환급">관세 ›</button>
                                            <button type="button" class="cat-chip has-subs" data-subs="무역금융,환율,보험,LC">금융 ›</button>
                                            <button type="button" class="cat-chip has-subs" data-subs="플랫폼,자동화,블록체인">IT ›</button>
                                            <button type="button" class="cat-chip has-subs" data-subs="농산물,수산물,가공식품,건강식품">식품 ›</button>
                                            <button type="button" class="cat-chip">화장품</button>
                                            <button type="button" class="cat-chip">자동차</button>
                                            <button type="button" class="cat-chip">섬유/의류</button>
                                            <button type="button" class="cat-chip">기계/장비</button>
                                            <button type="button" class="cat-chip">에너지</button>
                                        </div>
                                        <button type="button" class="category-scroll-arrow category-scroll-right">
                                            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z" fill="currentColor" /></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <!-- 답글 모달 하단 영역: 위치 표시, 툴바, 이모지 버튼, 제출 버튼 -->
                            <div class="tweet-modal__footer">
                                <div class="tweet-modal__footer-bottom" hidden>
                                    <div class="tweet-modal__toolbar">
                                        <div class="tweet-modal__tool-file">

        <div class="post-detail-notification-dialog__body">
            <p class="post-detail-notification-dialog__question">이 게시물에 어떤 문제가 있나요?</p>
            <ul class="post-detail-notification-report__list">
                <li>
                    <button type="button" class="post-detail-notification-report__item"><span>관심 없음</span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <g>
                                <path d="M9.293 6.293 10.707 4.88 17.828 12l-7.121 7.12-1.414-1.413L14.999 12z"></path>
                            </g>
                        </svg>
                    </button>
                </li>
                <li>
                    <button type="button" class="post-detail-notification-report__item"><span>스팸</span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <g>
                                <path d="M9.293 6.293 10.707 4.88 17.828 12l-7.121 7.12-1.414-1.413L14.999 12z"></path>
                            </g>
                        </svg>
                    </button>
                </li>
                <li>
                    <button type="button" class="post-detail-notification-report__item"><span>욕설 또는 유해한 표현</span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <g>
                                <path d="M9.293 6.293 10.707 4.88 17.828 12l-7.121 7.12-1.414-1.413L14.999 12z"></path>
                            </g>
                        </svg>
                    </button>
                </li>
                <li>
                    <button type="button" class="post-detail-notification-report__item"><span>민감한 콘텐츠</span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <g>
                                <path d="M9.293 6.293 10.707 4.88 17.828 12l-7.121 7.12-1.414-1.413L14.999 12z"></path>
                            </g>
                        </svg>
                    </button>
                </li>
                <li>
                    <button type="button" class="post-detail-notification-report__item"><span>허위 정보</span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <g>
                                <path d="M9.293 6.293 10.707 4.88 17.828 12l-7.121 7.12-1.414-1.413L14.999 12z"></path>
                            </g>
                        </svg>
                    </button>
                </li>
            </ul>
        </div>
    </div>
</div>
<div id="layers" aria-hidden="true"></div>

<!-- 북마크 폴더 선택 모달 -->
<div class="bookmark-share-sheet" id="shareBookmarkModal" hidden>
    <div class="bookmark-share-sheet-backdrop" data-share-close="true"></div>
    <div class="bookmark-share-sheet-card bookmark-share-sheet-card--bookmark"
         role="dialog" aria-modal="true" aria-labelledby="shareBookmarkTitle">
        <div class="bookmark-share-sheet-header">
            <button type="button" class="bookmark-share-sheet-icon-btn" data-share-close="true" aria-label="돌아가기">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path></svg>
            </button>
            <h2 id="shareBookmarkTitle" class="bookmark-share-sheet-title">폴더에 추가</h2>
            <span class="bookmark-share-sheet-header-spacer"></span>
        </div>
        <button type="button" class="bookmark-share-sheet-create-folder" id="shareBookmarkCreateFolder">
            새 북마크 폴더 만들기
        </button>
        <div class="bookmark-share-sheet-folder-list" id="shareBookmarkFolderList">
            <!-- 폴더 목록은 JS에서 동적 생성 -->
        </div>
    </div>
</div>

<!-- 폴더 만들기 모달 -->
<div class="bookmark-modal-overlay" id="createFolderModal" aria-hidden="true">
    <div class="bookmark-modal" role="dialog" aria-modal="true" aria-labelledby="createFolderModalTitle">
        <div class="bookmark-modal-header">
            <button class="bookmark-modal-close" id="createFolderClose" type="button" aria-label="뒤로 가기">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"/></svg>
            </button>
            <h2 class="bookmark-modal-title" id="createFolderModalTitle">폴더 만들기</h2>
            <button class="bookmark-modal-submit" id="createFolderSubmit" type="button" disabled>만들기</button>
        </div>
        <div class="bookmark-modal-body">
            <label class="bookmark-modal-field" for="createFolderInput">
                <span class="bookmark-modal-label">이름</span>
                <span class="bookmark-modal-count" id="createFolderCount" aria-live="polite">0 / 25</span>
                <input class="bookmark-modal-input" id="createFolderInput" type="text" maxlength="25" autocomplete="off" />
            </label>
        </div>
    </div>
</div>

<!-- 모바일 nav + 더보기 아코디언 (공용 fragment) -->
<div th:replace="~{common/mobile-nav :: mobileNav('more')}"></div>
<div th:replace="~{common/mobile-nav :: mobileMoreSheet}"></div>
    </th:block>
</body>
</html>
